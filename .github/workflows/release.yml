name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-amd64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Install GUI dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            gcc libgl1-mesa-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev libxxf86vm-dev

      - name: Build
        run: |
          go mod tidy
          go build -ldflags="-s -w" -o bullang-installer-linux-amd64 .

      - uses: actions/upload-artifact@v4
        with:
          name: bullang-installer-linux-amd64
          path: bullang-installer-linux-amd64

  build-macos-arm64:
    name: Build macOS Apple Silicon
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Build
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: 1
        run: |
          go mod tidy
          go build -ldflags="-s -w" -o bullang-installer-macos-apple-silicon .

      - uses: actions/upload-artifact@v4
        with:
          name: bullang-installer-macos-apple-silicon
          path: bullang-installer-macos-apple-silicon

  build-macos-amd64:
    name: Build macOS Intel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Build
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: 1
        run: |
          go mod tidy
          go build -ldflags="-s -w" -o bullang-installer-macos-intel .

      - uses: actions/upload-artifact@v4
        with:
          name: bullang-installer-macos-intel
          path: bullang-installer-macos-intel

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Build
        run: |
          go mod tidy
          go build -ldflags="-s -w -H=windowsgui" -o bullang-installer-windows-x86_64.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: bullang-installer-windows-x86_64.exe
          path: bullang-installer-windows-x86_64.exe

  release:
    name: Create GitHub Release
    needs:
      - build-linux-amd64
      - build-macos-arm64
      - build-macos-amd64
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Bullang Installer ${{ github.ref_name }}
          body: |
            ## Bullang Installer ${{ github.ref_name }}

            Download the file for your platform and double-click to run it.

            ---

            ### For Windows
            → Download **`bullang-installer-windows-x86_64.exe`**
            Right-click → Run as administrator if prompted.

            ### For macOS — Apple Silicon (M1, M2, M3, M4)
            → Download **`bullang-installer-macos-apple-silicon`**
            Open Terminal and run:
            ```
            chmod +x ~/Downloads/bullang-installer-macos-apple-silicon
            ~/Downloads/bullang-installer-macos-apple-silicon
            ```

            ### For macOS — Intel
            → Download **`bullang-installer-macos-intel`**
            Open Terminal and run:
            ```
            chmod +x ~/Downloads/bullang-installer-macos-intel
            ~/Downloads/bullang-installer-macos-intel
            ```

            ### For Linux — x86_64 (Ubuntu, Debian, Arch and most desktop distros)
            → Download **`bullang-installer-linux-amd64`**
            Open Terminal and run:
            ```
            chmod +x ~/Downloads/bullang-installer-linux-amd64
            ~/Downloads/bullang-installer-linux-amd64
            ```

            ---

            **What gets installed:** Go · Rust + Cargo · Bullscript · Bullarchy · Python · Java · C/C++
          files: dist/*
          draft: false
          prerelease: false
